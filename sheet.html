<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Result Sheet • MCCS</title>
    <link rel="icon" type="image/png" href="113.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* ══════════════════════════════════════════════════════════
           PREMIUM RESULT SHEET - Matching about.html Design
           Green Theme: #006B3F, #00a85a, #00c97a
           Fonts: Playfair Display + Outfit
        ══════════════════════════════════════════════════════════ */
        
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --g1: #004d2e;
            --g2: #006B3F;
            --g3: #00a85a;
            --g4: #00c97a;
            --red: #C8102E;
            --bg: #f0fdf4;
            --surface: rgba(255, 255, 255, 0.88);
            --text: #0a1a10;
            --muted: #5a7a65;
            --subtle: #9ab8a3;
            --radius: 24px;
            --shadow: 0 24px 64px rgba(0, 107, 63, 0.13), 0 4px 16px rgba(0, 0, 0, 0.06);
            --shadow-xl: 0 40px 100px rgba(0, 107, 63, 0.2), 0 8px 32px rgba(0, 0, 0, 0.08);
        }

        /* ── DARK MODE TOKENS ───────────────────────────────────── */
        body.dark {
            --bg: #0f172a;
            --surface: rgba(30, 41, 59, 0.88);
            --text: #f1f5f9;
            --muted: #94a3b8;
            --subtle: #64748b;
            --shadow: 0 24px 64px rgba(0, 0, 0, 0.3), 0 4px 16px rgba(0, 0, 0, 0.2);
            --shadow-xl: 0 40px 100px rgba(0, 0, 0, 0.4), 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        body.dark::before {
            background:
                radial-gradient(ellipse 70% 55% at 15% 10%, rgba(0, 193, 110, 0.12) 0%, transparent 60%),
                radial-gradient(ellipse 55% 70% at 85% 85%, rgba(0, 171, 85, 0.08) 0%, transparent 55%),
                radial-gradient(ellipse 100% 100% at 50% 50%, #0f172a 55%, #1e293b 100%);
        }

        body.dark::after {
            background:
                radial-gradient(circle at 22% 18%, rgba(34, 197, 94, 0.1) 0%, transparent 22%),
                radial-gradient(circle at 76% 35%, rgba(34, 197, 94, 0.08) 0%, transparent 18%),
                radial-gradient(circle at 50% 85%, rgba(255, 255, 255, 0.05) 0%, transparent 28%);
            opacity: 0.7;
        }

        html {
            scroll-behavior: smooth;
            scrollbar-width: none;
        }

        html::-webkit-scrollbar {
            display: none;
        }

        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            padding: 32px 16px 64px;
            position: relative;
        }

        /* ── ANIMATED MESH BACKGROUND ─────────────────────────── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -2;
            background:
                radial-gradient(ellipse 70% 55% at 15% 10%, rgba(0, 193, 110, 0.18) 0%, transparent 60%),
                radial-gradient(ellipse 55% 70% at 85% 85%, rgba(0, 171, 85, 0.14) 0%, transparent 55%),
                radial-gradient(ellipse 100% 100% at 50% 50%, #f0fdf4 55%, #d1fae5 100%);
            animation: meshDrift 20s ease-in-out infinite alternate;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -3;
            background:
                radial-gradient(circle at 22% 18%, rgba(34, 197, 94, 0.18) 0%, transparent 22%),
                radial-gradient(circle at 76% 35%, rgba(34, 197, 94, 0.12) 0%, transparent 18%),
                radial-gradient(circle at 50% 85%, rgba(255, 255, 255, 0.22) 0%, transparent 28%);
            pointer-events: none;
            opacity: 0.95;
            filter: blur(2px);
            animation: bloomPulse 16s ease-in-out infinite alternate;
        }

        @keyframes meshDrift {
            from { opacity: 1; }
            to { opacity: 0.82; }
        }

        @keyframes bloomPulse {
            from { transform: scale(1); opacity: 0.95; }
            to { transform: scale(1.02); opacity: 1; }
        }

        /* ── PARTICLE CANVAS ────────────────────────────────────── */
        #particleCanvas {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            opacity: 0.6;
        }

        /* ── CONTAINER ──────────────────────────────────────────── */
        .page-wrap {
            max-width: 960px;
            margin: 0 auto;
        }

        /* ── HEADER ─────────────────────────────────────────────── */
        .site-header {
            border-radius: var(--radius) var(--radius) 0 0;
            background: linear-gradient(135deg, #064e3b 0%, #006B3F 50%, #047857 100%);
            padding: 32px 36px 28px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 107, 63, 0.3);
            opacity: 0;
            transform: translateY(-20px);
            filter: blur(6px);
            animation: headerIn 0.75s 0.1s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        .site-header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='52' height='52' viewBox='0 0 52 52' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%2300c16e' fill-opacity='0.07'%3E%3Cpath d='M26 0l4 8h-8zM0 26l8-4v8zM52 26l-8 4v-8zM26 52l-4-8h8z'/%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
        }

        .site-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--red), #e53e3e, var(--red), transparent);
        }

        @keyframes headerIn {
            to {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 12px;
        }

        .header-logo {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        .header-school {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.5rem, 4vw, 2rem);
            color: #fff;
            letter-spacing: -0.01em;
            line-height: 1.2;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .header-sub {
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(167, 243, 208, 0.85);
            text-align: center;
        }

        /* ── MAIN CARD ──────────────────────────────────────────── */
        .main-card {
            position: relative;
            overflow: visible;
            background: var(--surface);
            backdrop-filter: blur(40px) saturate(1.5);
            border: 1px solid rgba(0, 107, 63, 0.14);
            border-top: none;
            border-radius: 0 0 var(--radius) var(--radius);
            box-shadow: var(--shadow);
            padding: 40px 36px 36px;
            transition: box-shadow 0.4s ease, transform 0.4s ease;
            animation: cardBloom 14s ease-in-out infinite alternate;
        }

        .main-card::before,
        .main-card::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            filter: blur(24px);
        }

        .main-card::before {
            width: 220px;
            height: 220px;
            top: -40px;
            right: -52px;
            background: radial-gradient(circle, rgba(0, 193, 110, 0.2) 0%, transparent 55%);
        }

        .main-card::after {
            width: 180px;
            height: 180px;
            bottom: -50px;
            left: -40px;
            background: radial-gradient(circle, rgba(0, 255, 156, 0.14) 0%, transparent 60%);
        }

        .main-card:hover {
            box-shadow: var(--shadow-xl);
            transform: translateY(-4px);
        }

        @keyframes cardBloom {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        /* ── SHEET CARD (Premium Design) ────────────────────────── */
        .sheet {
            position: relative;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 32px 80px rgba(0, 107, 63, 0.14), 0 8px 32px rgba(0, 0, 0, 0.08);
            margin-bottom: 32px;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            opacity: 0;
            transform: translateY(24px) scale(0.98);
            filter: blur(6px);
            animation: sheetIn 0.8s 0.3s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        @keyframes sheetIn {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        .sheet:hover {
            box-shadow: 0 48px 120px rgba(0, 107, 63, 0.2), 0 16px 48px rgba(0, 0, 0, 0.12);
            transform: translateY(-4px);
        }
        .sheet-stripe {
            height: 10px;
            background: linear-gradient(90deg, #004d2e 0%, #006B3F 25%, #00a85a 50%, #00c97a 100%);
            position: relative;
        }
        .sheet-stripe::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,.4), transparent);
            animation: stripeShine 4s linear infinite;
        }
        @keyframes stripeShine { 0% { transform: translateX(-150%); } 100% { transform: translateX(250%); } }

        .sheet-head {
            padding: 32px 36px 24px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 20px;
            border-bottom: 1px solid rgba(0,107,63,.1);
            background: linear-gradient(135deg, rgba(0,107,63,.03), transparent);
        }
        .sheet-student-name {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 700;
            line-height: 1.1;
            color: #0a1a10;
        }
        .sheet-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 8px;
        }
        .sheet-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 9999px;
            letter-spacing: .5px;
        }
        .pill-roll { background: rgba(0,107,63,.1); color: #006B3F; border: 1px solid rgba(0,107,63,.2); }
        .pill-class { background: rgba(59,130,246,.1); color: #1d4ed8; border: 1px solid rgba(59,130,246,.2); }
        .pill-group { background: rgba(124,58,237,.1); color: #6d28d9; border: 1px solid rgba(124,58,237,.2); }

        .sheet-score-box { text-align: right; }
        .score-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #5a7a65; }
        .score-num { font-family: 'JetBrains Mono', monospace; font-size: 52px; font-weight: 800; line-height: 1; color: #006B3F; }
        .score-denom { font-size: 15px; color: #9ab8a3; }

        .sheet-table-wrap { overflow-x: auto; }
        .sheet-table {
            width: 100%;
            border-collapse: collapse;
        }
        .sheet-table th {
            padding: 14px 20px;
            background: linear-gradient(90deg, rgba(0,107,63,.06), rgba(0,107,63,.03));
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .8px;
            color: #006B3F;
            text-align: left;
        }
        .sheet-table th:not(:first-child) { text-align: center; }
        .sheet-table td {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(0,107,63,.08);
            font-size: 14.5px;
        }
        .sheet-table td:not(:first-child) {
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
        }
        .sub-name { font-weight: 600; color: #0a1a10; }
        .sub-opt-tag {
            font-size: 10px;
            background: rgba(217,119,6,.12);
            color: #92400e;
            padding: 2px 8px;
            border-radius: 9999px;
            margin-left: 8px;
        }
        .gpill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 46px;
            height: 32px;
            border-radius: 10px;
            font-size: 13.5px;
            font-weight: 800;
        }
        .gA-plus { background: linear-gradient(135deg,#064e3b,#006B3F); color:#fff; }
        .gA { background: rgba(0,107,63,.12); color:#006B3F; }
        .gB { background: rgba(59,130,246,.12); color:#1d4ed8; }
        .gC { background: rgba(245,158,11,.12); color:#92400e; }
        .gD { background: rgba(239,68,68,.1); color:#b91c1c; }
        .gF { background: rgba(239,68,68,.15); color:#991b1b; font-weight:900; }

        .sheet-foot {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            border-top: 2px dashed rgba(0,107,63,.2);
        }
        .foot-cell {
            padding: 24px 20px;
            text-align: center;
            border-right: 1px solid rgba(0,107,63,.1);
        }
        .foot-cell:last-child { border-right: none; }
        .foot-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #5a7a65;
            margin-bottom: 6px;
        }
        .foot-val {
            font-family: 'JetBrains Mono', monospace;
            font-size: 28px;
            font-weight: 800;
        }
        .fv-green { color: #006B3F; }
        .fv-purple { color: #7c3aed; }
        .fv-amber { color: #d97706; }
        .fv-grade { font-family: 'Playfair Display', serif; font-size: 34px; font-weight: 900; }

        .not-found {
            text-align: center;
            padding: 80px 20px;
            background: #fff;
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(0,107,63,.1);
        }
        .not-found h2 {
            font-size: 28px;
            color: #C8102E;
            margin-bottom: 12px;
        }

        /* ── ACTION BUTTONS ─────────────────────────────────────── */
        .action-bar {
            display: flex;
            gap: 14px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 32px;
            opacity: 0;
            transform: translateY(20px);
            animation: actionsIn 0.6s 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        @keyframes actionsIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn {
            padding: 15px 32px;
            border-radius: 9999px;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.3px;
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(105deg, transparent 30%, rgba(255, 255, 255, 0.18) 50%, transparent 70%);
            transform: translateX(-120%);
            transition: transform 0.6s ease;
        }

        .btn:hover::after {
            transform: translateX(120%);
        }

        .btn-primary {
            background: linear-gradient(135deg, #064e3b, var(--g2), var(--g3));
            color: white;
            border: none;
            box-shadow: 0 6px 22px rgba(0, 107, 63, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.28);
        }

        .btn-primary:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 16px 40px rgba(0, 107, 63, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.32);
        }

        .btn-outline {
            background: rgba(0, 107, 63, 0.07);
            color: var(--g2);
            border: 2px solid rgba(0, 107, 63, 0.22);
        }

        .btn-outline:hover {
            background: rgba(0, 107, 63, 0.12);
            border-color: var(--g3);
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0, 107, 63, 0.18);
        }

        .btn:active {
            transform: scale(0.97);
        }

        /* ── NOT FOUND STATE ────────────────────────────────────── */
        .not-found {
            text-align: center;
            padding: 80px 32px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            box-shadow: 0 28px 70px rgba(0, 107, 63, 0.14);
            opacity: 0;
            transform: translateY(24px);
            animation: fadeIn 0.6s 0.2s ease forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .not-found-icon {
            font-size: 72px;
            margin-bottom: 20px;
            opacity: 0.7;
        }

        .not-found h2 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: var(--red);
            margin-bottom: 12px;
        }

        .not-found p {
            font-size: 16px;
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 12px;
        }

        /* ── FOOTER ─────────────────────────────────────────────── */
        .site-footer {
            margin-top: 32px;
            text-align: center;
            font-size: 12px;
            color: var(--muted);
            line-height: 1.7;
            opacity: 0;
            animation: fadeIn 0.6s 0.8s ease forwards;
        }

        /* ── PRINT STYLES ───────────────────────────────────────── */
        @media print {
            body {
                background: white;
                padding: 0;
            }

            body::before,
            body::after,
            #particleCanvas {
                display: none;
            }

            .site-header,
            .action-bar,
            .site-footer {
                display: none;
            }

            .main-card {
                box-shadow: none;
                border: 1px solid #ddd;
                padding: 20px;
            }

            .sheet {
                box-shadow: none;
                page-break-inside: avoid;
            }
        }

        /* ── RESPONSIVE ─────────────────────────────────────────── */
        @media (max-width: 768px) {
            body {
                padding: 16px 10px 40px;
            }

            body::before,
            body::after {
                opacity: 0.7;
                filter: blur(1px);
                animation: none;
            }

            #particleCanvas {
                opacity: 0.4;
            }

            .site-header {
                padding: 20px 16px 18px;
                border-radius: 20px 20px 0 0;
            }

            .header-logo {
                width: 44px;
                height: 44px;
            }

            .header-school {
                font-size: clamp(1.2rem, 5vw, 1.5rem);
            }

            .header-sub {
                font-size: 0.7rem;
            }

            .main-card {
                padding: 24px 16px 20px;
                backdrop-filter: blur(20px) saturate(1.2);
                border-radius: 0 0 20px 20px;
            }

            .main-card::before,
            .main-card::after {
                filter: blur(12px);
                opacity: 0.6;
            }

            .sheet {
                border-radius: 20px;
                box-shadow: 0 16px 40px rgba(0, 107, 63, 0.1), 0 4px 16px rgba(0, 0, 0, 0.06);
            }

            .sheet:hover {
                transform: none;
                box-shadow: 0 16px 40px rgba(0, 107, 63, 0.1), 0 4px 16px rgba(0, 0, 0, 0.06);
            }

            .sheet-head {
                grid-template-columns: 1fr;
                text-align: center;
                padding: 20px 16px 18px;
            }

            .sheet-student-name {
                font-size: 22px;
            }

            .sheet-meta {
                justify-content: center;
                gap: 8px;
            }

            .sheet-pill {
                font-size: 11px;
                padding: 5px 12px;
            }

            .sheet-score-box {
                text-align: center;
                margin-top: 16px;
            }

            .score-num {
                font-size: 42px;
            }

            .score-denom {
                font-size: 13px;
            }

            .sheet-table-wrap {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            .sheet-table {
                min-width: 600px;
            }

            .sheet-table th,
            .sheet-table td {
                padding: 12px 10px;
                font-size: 12px;
            }

            .sheet-foot {
                grid-template-columns: repeat(2, 1fr);
            }

            .foot-cell {
                padding: 18px 12px;
            }

            .foot-cell:nth-child(2),
            .foot-cell:nth-child(4) {
                border-right: none;
            }

            .foot-cell:nth-child(1),
            .foot-cell:nth-child(2) {
                border-bottom: 1px solid rgba(0, 107, 63, 0.08);
            }

            .foot-val {
                font-size: 24px;
            }

            .fv-grade {
                font-size: 28px;
            }

            .action-bar {
                flex-direction: column;
                gap: 10px;
                margin-top: 24px;
            }

            .btn {
                width: 100%;
                justify-content: center;
                padding: 14px 24px;
                min-height: 48px;
                font-size: 14px;
            }

            .btn:hover {
                transform: none;
            }

            .btn:active {
                transform: scale(0.98);
            }

            .not-found {
                padding: 60px 20px;
            }

            .not-found-icon {
                font-size: 56px;
            }

            .not-found h2 {
                font-size: 22px;
            }

            .not-found p {
                font-size: 14px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 12px 8px 32px;
            }

            :root {
                --radius: 18px;
            }

            .site-header {
                padding: 16px 12px 14px;
                border-radius: 18px 18px 0 0;
            }

            .header-content {
                flex-direction: column;
                gap: 10px;
            }

            .header-logo {
                width: 40px;
                height: 40px;
            }

            .header-school {
                font-size: 1.1rem;
                line-height: 1.3;
            }

            .header-sub {
                font-size: 0.65rem;
                letter-spacing: 0.08em;
            }

            .main-card {
                padding: 20px 12px 16px;
                border-radius: 0 0 18px 18px;
            }

            .sheet {
                border-radius: 18px;
                margin-bottom: 20px;
            }

            .sheet-stripe {
                height: 6px;

<body>

    <canvas id="particleCanvas"></canvas>

    <div class="page-wrap">

    <script>
        /* ══════════════════════════════════════════════════════════
           PARTICLE SYSTEM (Optimized for Mobile)
        ══════════════════════════════════════════════════════════ */
        (function () {
            const canvas = document.getElementById('particleCanvas');
            if (!canvas) return;

            const ctx = canvas.getContext('2d', { alpha: true });
            if (!ctx) return;

            let w = 0, h = 0;
            const particles = [];
            const isMobile = window.innerWidth <= 768;
            const isLowEnd = isMobile && (window.devicePixelRatio <= 1.5 || navigator.hardwareConcurrency <= 4);
            
            // Adaptive particle count
            const COUNT = isLowEnd ? 12 : isMobile ? 20 : 55;

            // Skip particles on very low-end devices
            if (isLowEnd && window.innerWidth <= 480) {
                canvas.style.display = 'none';
                return;
            }

            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            }

            function initParticles() {
                particles.length = 0;
                for (let i = 0; i < COUNT; i++) {
                    particles.push({
                        x: Math.random() * w,
                        y: Math.random() * h,
                        r: Math.random() * 2.5 + 1.5,
                        vx: (Math.random() - 0.5) * 0.4,
                        vy: Math.random() * -0.4 - 0.1,
                        alpha: Math.random() * 0.25 + 0.1,
                        hue: Math.random() * 30 + 140
                    });
                }
            }

            let lastTime = 0;
            const targetFPS = isMobile ? 30 : 60;
            const frameInterval = 1000 / targetFPS;

            function animate(currentTime) {
                // Frame rate limiting for mobile
                if (currentTime - lastTime < frameInterval) {
                    requestAnimationFrame(animate);
                    return;
                }
                lastTime = currentTime;

                ctx.clearRect(0, 0, w, h);

                for (let p of particles) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${p.hue}, 70%, 50%, ${p.alpha})`;
                    
                    // Disable shadow on mobile for performance
                    if (!isMobile) {
                        ctx.shadowBlur = 8;
                        ctx.shadowColor = `hsla(${p.hue}, 80%, 55%, 0.3)`;
                    }
                    
                    ctx.fill();
                    
                    if (!isMobile) {
                        ctx.shadowBlur = 0;
                    }

                    p.x += p.vx;
                    p.y += p.vy;

                    if (p.y < -10) {
                        p.y = h + 10;
                        p.x = Math.random() * w;
                    }
                    if (p.x < -10) p.x = w + 10;
                    if (p.x > w + 10) p.x = -10;
                }

                requestAnimationFrame(animate);
            }

            // Pause animation when page is not visible
            let isVisible = true;
            document.addEventListener('visibilitychange', () => {
                isVisible = !document.hidden;
                if (isVisible) {
                    requestAnimationFrame(animate);
                }
            });

            // Debounced resize
            let resizeTimeout;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => {
                    resize();
                    initParticles();
                }, 250);
            });

            resize();
            initParticles();
            
            if (isVisible) {
                requestAnimationFrame(animate);
            }
        })();

        /* ══════════════════════════════════════════════════════════
           REVEAL OBSERVER
        ══════════════════════════════════════════════════════════ */
        const revealObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    revealObserver.unobserve(entry.target);
                }
            });
        }, { threshold: 0.08 });

        document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));

        /* ══════════════════════════════════════════════════════════
           FIREBASE REALTIME DATABASE — DATA LAYER
           Replaces localStorage getDB() with Firebase reads
        ══════════════════════════════════════════════════════════ */
        let firebaseReady = false;
        let _localCache = [];
        let _unsubscribe = null;

        /* Wait for Firebase to initialize */
        async function initFirebase() {
            return new Promise((resolve) => {
                if (window._firebase) {
                    firebaseReady = true;
                    resolve();
                } else {
                    window.addEventListener('firebase-ready', () => {
                        firebaseReady = true;
                        resolve();
                    });
                }
            });
        }

        /* READ all students from Firebase Realtime Database */
        async function getDB() {
            if (!firebaseReady) return _localCache;
            const { ref, get } = window._firebase;
            try {
                const snapshot = await get(ref(window._firebase.db, 'results'));
                const val = snapshot.val();
                if (val) {
                    _localCache = Object.entries(val).map(([id, data]) => ({ id, ...data }));
                } else {
                    _localCache = [];
                }
            } catch (e) {
                console.error('Firebase read error:', e);
            }
            return _localCache;
        }

        /* SETUP REAL-TIME LISTENER — auto-updates when cloud changes */
        function setupRealtimeListener() {
            if (!firebaseReady) return;
            const { ref, onValue } = window._firebase;
            _unsubscribe = onValue(ref(window._firebase.db, 'results'), (snapshot) => {
                const val = snapshot.val();
                if (val) {
                    _localCache = Object.entries(val).map(([id, data]) => ({ id, ...data }));
                } else {
                    _localCache = [];
                }
                console.log('☁️ Real-time sync: ' + _localCache.length + ' students loaded from cloud');
            }, (error) => {
                console.error('Firebase realtime listener error:', error);
            });
        }

        /* ══════════════════════════════════════════════════════════
           DATABASE & RESULT LOGIC
        ══════════════════════════════════════════════════════════ */
        const DB_KEY = 'rp_results';

        function gradeOf(pct) {
            if (pct >= 90) return {g: 'A+', cls: 'gA-plus'};
            if (pct >= 80) return {g: 'A', cls: 'gA'};
            if (pct >= 70) return {g: 'A-', cls: 'gA'};
            if (pct >= 60) return {g: 'B', cls: 'gB'};
            if (pct >= 50) return {g: 'C', cls: 'gC'};
            if (pct >= 40) return {g: 'D', cls: 'gD'};
            return {g: 'F', cls: 'gF'};
        }

        function gpaOf(pct) {
            if (pct >= 90) return 5;
            if (pct >= 80) return 4;
            if (pct >= 70) return 3.5;
            if (pct >= 60) return 3;
            if (pct >= 50) return 2.5;
            if (pct >= 40) return 2;
            return 1;
        }

        function fullMark(cls, sub) {
            if (['জীববিজ্ঞান','উচ্চতর গণিত','কৃষি শিক্ষা','তথ্য ও যোগাযোগ প্রযুক্তি (ICT)'].includes(sub)) return 100;
            if (['বাংলা','ইংরেজি'].includes(sub)) return 100;
            return 100;
        }

        function renderSheet(student) {
            if (!student) {
                document.getElementById('resultContainer').innerHTML = `
                    <div class="not-found reveal rd1">
                        <div class="not-found-icon">❌</div>
                        <h2>Result Not Found</h2>
                        <p style="font-size:16px; margin-bottom:30px;">
                            The roll number you searched for does not exist in our database.<br>
                            Please check your roll number and try again.
                        </p>
                        <button onclick="goBack()" class="btn btn-primary" style="font-size:17px; padding:18px 40px;">
                            ← Back to Search
                        </button>
                    </div>`;
                
                // Trigger reveal animation
                setTimeout(() => {
                    document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));
                }, 100);
                return;
            }

            let rowsHTML = '';
            let totalObtained = 0;
            let totalFull = 0;
            let gpaSum = 0;
            let subjectCount = 0;
            let highestMark = 0;

            student.subjects.forEach(sub => {
                const fm = fullMark(student.class, sub.subject);
                const marks = parseFloat(sub.marks) || 0;
                totalObtained += marks;
                totalFull += fm;
                highestMark = Math.max(highestMark, marks);

                const pct = fm > 0 ? (marks / fm) * 100 : 0;
                const gr = gradeOf(Math.floor(pct));
                const gpa = gpaOf(pct);
                gpaSum += gpa;
                subjectCount++;

                rowsHTML += `
                <tr>
                    <td><span class="sub-name">${sub.subject}${sub.isOptional ? '<span class="sub-opt-tag">Optional</span>' : ''}</span></td>
                    <td>${sub.mcq !== undefined ? sub.mcq : '—'}</td>
                    <td>${sub.cq !== undefined ? sub.cq : '—'}</td>
                    <td>${sub.practical !== undefined ? sub.practical : '—'}</td>
                    <td style="font-weight:800; font-size:17px; color:#006B3F;">${marks}</td>
                    <td><span class="gpill ${gr.cls}">${gr.g}</span></td>
                </tr>`;
            });

            const avgGPA = subjectCount ? (gpaSum / subjectCount).toFixed(2) : '0.00';
            const overallPct = totalFull ? (totalObtained / totalFull) * 100 : 0;
            const overallGrade = gradeOf(Math.floor(overallPct));

            const groupPill = student.group ? `<span class="sheet-pill pill-group">⚗️ ${student.group}</span>` : '';

            const html = `
            <div class="sheet reveal rd1">
                <div class="sheet-stripe"></div>
                
                <div class="sheet-head">
                    <div>
                        <div class="sheet-student-name">${student.name}</div>
                        <div class="sheet-meta">
                            <span class="sheet-pill pill-roll">Roll: <strong>${student.roll}</strong></span>
                            <span class="sheet-pill pill-class">📚 ${student.class || '—'}</span>
                            ${groupPill}
                        </div>
                    </div>
                    <div class="sheet-score-box">
                        <div class="score-label">TOTAL OBTAINED</div>
                        <div class="score-num">${totalObtained}</div>
                        <div class="score-denom">out of ${totalFull}</div>
                    </div>
                </div>

                <div class="sheet-table-wrap">
                    <table class="sheet-table">
                        <thead>
                            <tr>
                                <th>Subject</th>
                                <th>MCQ</th>
                                <th>CQ</th>
                                <th>Practical</th>
                                <th>Total</th>
                                <th>Grade</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${rowsHTML}
                        </tbody>
                    </table>
                </div>

                <div class="sheet-foot">
                    <div class="foot-cell">
                        <div class="foot-label">Total Marks</div>
                        <div class="foot-val fv-green">${totalObtained}</div>
                    </div>
                    <div class="foot-cell">
                        <div class="foot-label">Average GPA</div>
                        <div class="foot-val fv-purple">${avgGPA}</div>
                    </div>
                    <div class="foot-cell">
                        <div class="foot-label">Highest Mark</div>
                        <div class="foot-val fv-amber">${highestMark}</div>
                    </div>
                    <div class="foot-cell">
                        <div class="foot-label">Overall Grade</div>
                        <div class="foot-val fv-grade ${overallGrade.cls}">${overallGrade.g}</div>
                    </div>
                </div>
            </div>`;

            document.getElementById('resultContainer').innerHTML = html;
            document.getElementById('actionBar').style.display = 'flex';

            // Trigger reveal animations
            setTimeout(() => {
                document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));
            }, 100);
        }

        function goBack() {
            window.location.href = 'about.html';
        }

        /* ══════════════════════════════════════════════════════════
           MAIN LOGIC - Load student on page load
        ══════════════════════════════════════════════════════════ */
        async function loadStudent() {
            const params = new URLSearchParams(window.location.search);
            const roll = params.get('roll');
            const id = params.get('id');

            // Get data from Firebase Realtime Database
            const db = await getDB();
            let student = null;

            if (id) {
                student = db.find(s => s.id === id);
            } else if (roll) {
                student = db.find(s => s.roll && s.roll.toLowerCase() === roll.toLowerCase());
            }

            renderSheet(student);

            // Update page title
            if (student) {
                document.title = `${student.name} - Result Sheet • MCCS`;
            }
        }

        window.addEventListener('load', async () => {
            // Initialize Firebase Realtime Database
            await initFirebase();
            console.log('✅ Firebase Realtime Database ready for result sheet');

            // Setup real-time listener for live cloud sync
            setupRealtimeListener();

            // Load the student result
            await loadStudent();
        });

        /* ══════════════════════════════════════════════════════════
           LIVE SYNC - Auto refresh when database changes
        ══════════════════════════════════════════════════════════ */
        window.addEventListener('storage', function(e) {
            if (e.key === DB_KEY) {
                console.log('Database updated — live sync active (Firebase also syncing)');
                getDB(); // Refresh cache from Firebase
            }
        });

        // Cleanup listeners on page unload
        window.addEventListener('beforeunload', () => {
            if (_unsubscribe) _unsubscribe();
            console.log('👋 Cleaning up Firebase listeners');
        });
    </script>

    <!-- Theme Sync from Firebase -->
    <script type="module">
        import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

        // Use existing Firebase app from main script
        const waitForFirebase = () => {
            return new Promise((resolve) => {
                if (window._firebaseApp) {
                    resolve(window._firebaseApp);
                } else {
                    const checkInterval = setInterval(() => {
                        if (window._firebaseApp) {
                            clearInterval(checkInterval);
                            resolve(window._firebaseApp);
                        }
                    }, 100);
                }
            });
        };

        waitForFirebase().then(app => {
            const db = getDatabase(app);
            
            const applyTheme = (isDark) => {
                document.body.classList.toggle('dark', isDark);
            };

            const themeRef = ref(db, 'settings/theme');
            
            // Initial load
            get(themeRef).then(snapshot => {
                const theme = snapshot.val();
                if (theme) {
                    applyTheme(theme === 'dark');
                } else {
                    const sys = window.matchMedia('(prefers-color-scheme: dark)').matches;
                    applyTheme(sys);
                }
            }).catch(err => {
                console.warn('Theme load error:', err);
                const sys = window.matchMedia('(prefers-color-scheme: dark)').matches;
                applyTheme(sys);
            });

            // Listen for real-time theme changes
            onValue(themeRef, snapshot => {
                const theme = snapshot.val();
                if (theme) {
                    applyTheme(theme === 'dark');
                }
            });
        });
    </script>
